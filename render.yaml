services:
  - type: web
    name: clhs-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: COC_API_KEY
        sync: false
      - key: WEBAPP_URL
        value: https://clhs-bot.onrender.com
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: clhs-db
          property: connectionString

databases:
  - name: clhs-db
    plan: free
    databaseName: clhs
