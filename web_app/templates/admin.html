<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Tracker Admin</title>
    <script src="/static/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div id="loading" class="flex items-center justify-center min-h-screen text-lg">
        Verifying access...
    </div>

    <div id="dashboard" style="display:none;" class="max-w-6xl mx-auto p-4">
        <header class="mb-6">
            <h1 class="text-2xl font-bold">👑 Admin Dashboard</h1>
            <p class="text-gray-400 text-sm">Clash Tracker Bot - System Overview</p>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-gray-400 text-sm">Total Users</div>
                <div id="totalUsers" class="text-3xl font-bold text-blue-400">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-gray-400 text-sm">Active Trackers</div>
                <div id="activeTrackers" class="text-3xl font-bold text-green-400">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-gray-400 text-sm">Ongoing Upgrades</div>
                <div id="activeUpgrades" class="text-3xl font-bold text-yellow-400">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-gray-400 text-sm">Total Upgrades</div>
                <div id="totalUpgrades" class="text-3xl font-bold text-purple-400">0</div>
            </div>
        </section>

        <section class="mb-6">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">📋 User Directory</h2>
                <input id="searchInput" oninput="filterUsers()" type="text" placeholder="Search users..." class="bg-gray-800 text-gray-100 px-3 py-1.5 rounded-lg text-sm border border-gray-700 focus:outline-none focus:border-blue-500">
            </div>
            <div class="overflow-x-auto">
                <table id="userTable" class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-700">
                            <th class="py-2 px-3">User ID</th>
                            <th class="py-2 px-3">Username</th>
                            <th class="py-2 px-3">TH Level</th>
                            <th class="py-2 px-3">Joined</th>
                            <th class="py-2 px-3">Last Sync</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-semibold mb-3">⚙️ System Health</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="text-gray-400 text-sm">Bot Uptime</div>
                    <div id="uptime" class="text-xl font-semibold">-</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="text-gray-400 text-sm">Active Scheduler Jobs</div>
                    <div id="schedulerJobs" class="text-xl font-semibold">-</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4">
                    <div class="text-gray-400 text-sm">Database</div>
                    <div id="dbStatus" class="text-xl font-semibold">-</div>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
