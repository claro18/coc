<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Tracker — Admin Panel</title>
    <script src="/static/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0a0a0f; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        .glass-hover:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .pulse-dot.active { background: #22c55e; box-shadow: 0 0 8px #22c55e88; animation: pulse 2s infinite; }
        .pulse-dot.inactive { background: #ef4444; box-shadow: 0 0 8px #ef444488; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card-gradient-1 { background: linear-gradient(135deg, #1e3a5f 0%, #0f1e33 100%); }
        .card-gradient-2 { background: linear-gradient(135deg, #1a3a2a 0%, #0f1e18 100%); }
        .card-gradient-3 { background: linear-gradient(135deg, #3a2a1a 0%, #1e1810 100%); }
        .card-gradient-4 { background: linear-gradient(135deg, #2a1a3a 0%, #18101e 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111118; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
        .stat-number { font-size: 2rem; font-weight: 800; line-height: 1; }
        @media (max-width: 640px) { .stat-number { font-size: 1.5rem; } }
        .user-row { transition: all 0.15s ease; }
        .user-row:hover { background: rgba(255,255,255,0.04); }
        .badge-th { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge-th-home { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .tag-text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 0.75rem; color: #6b7280; }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center" style="background: #0a0a0f; z-index: 100;">
        <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <div class="text-sm text-gray-500">Verifying access...</div>
    </div>

    <div id="dashboard" style="display:none;" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 fade-in">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-3">
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Admin Panel</h1>
                <p class="text-gray-500 text-sm mt-0.5">Clash Tracker — system overview & user management</p>
            </div>
            <div class="flex items-center gap-3 text-sm">
                <span id="statusBadge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-800/60">
                    <span class="pulse-dot" id="statusDot"></span>
                    <span id="statusText" class="text-gray-400">Loading...</span>
                </span>
                <span class="text-gray-600">|</span>
                <span class="text-gray-500"><span id="uptimeHeader" class="text-gray-400">—</span></span>
            </div>
        </div>

        <!-- Metrics -->
        <div id="metricsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-8">
            <div class="glass rounded-2xl p-4 sm:p-5 card-gradient-1 skeleton" id="skel-m1">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-blue-300/70">Total Users</span>
                    <span class="text-lg">👥</span>
                </div>
                <div class="stat-number text-blue-400" id="totalUsers">—</div>
            </div>
            <div class="glass rounded-2xl p-4 sm:p-5 card-gradient-2 skeleton" id="skel-m2">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-green-300/70">Active Trackers</span>
                    <span class="text-lg">📡</span>
                </div>
                <div class="stat-number text-green-400" id="activeTrackers">—</div>
            </div>
            <div class="glass rounded-2xl p-4 sm:p-5 card-gradient-3 skeleton" id="skel-m3">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-yellow-300/70">Ongoing Upgrades</span>
                    <span class="text-lg">⚡</span>
                </div>
                <div class="stat-number text-yellow-400" id="activeUpgrades">—</div>
            </div>
            <div class="glass rounded-2xl p-4 sm:p-5 card-gradient-4 skeleton" id="skel-m4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-purple-300/70">Total Upgrades</span>
                    <span class="text-lg">📦</span>
                </div>
                <div class="stat-number text-purple-400" id="totalUpgrades">—</div>
            </div>
        </div>

        <!-- User Directory -->
        <div class="glass rounded-2xl overflow-hidden fade-in" style="animation-delay: 0.1s;">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-4 sm:px-6 py-4 border-b border-white/5">
                <h2 class="text-base font-semibold">User Directory</h2>
                <div class="relative w-full sm:w-64">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input id="searchInput" oninput="debouncedFilter()" type="text" placeholder="Search by name, ID, tag..." class="w-full bg-gray-800/60 text-sm text-gray-200 pl-9 pr-3 py-2 rounded-xl border border-white/5 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition placeholder-gray-600">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table id="userTable" class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-500 text-left border-b border-white/5">
                            <th class="py-3 px-4 sm:px-6 font-medium">ID</th>
                            <th class="py-3 px-4 font-medium">User</th>
                            <th class="py-3 px-4 font-medium hidden sm:table-cell">Tag</th>
                            <th class="py-3 px-4 font-medium">TH</th>
                            <th class="py-3 px-4 font-medium hidden md:table-cell">Joined</th>
                            <th class="py-3 px-4 font-medium hidden md:table-cell">Last Sync</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
            <div id="tableFooter" class="px-4 sm:px-6 py-3 border-t border-white/5 text-xs text-gray-600"></div>
        </div>

        <!-- System Health -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4 mt-6 fade-in" style="animation-delay: 0.2s;">
            <div class="glass rounded-2xl p-4 sm:p-5 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-lg shrink-0">⏱</div>
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Uptime</div>
                    <div class="text-base font-semibold" id="uptime">—</div>
                </div>
            </div>
            <div class="glass rounded-2xl p-4 sm:p-5 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-yellow-500/10 flex items-center justify-center text-lg shrink-0">📅</div>
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Scheduler Jobs</div>
                    <div class="text-base font-semibold" id="schedulerJobs">—</div>
                </div>
            </div>
            <div class="glass rounded-2xl p-4 sm:p-5 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-green-500/10 flex items-center justify-center text-lg shrink-0">💾</div>
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Database</div>
                    <div class="text-base font-semibold" id="dbStatus">—</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
